<head>

<title>The Diagnosis Lab</title>
<style>
  /* ============================================
     DIAGNOSIS LAB — Standalone Deployment

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #0e0e0e;
    --card: #161616;
    --border: #2a2a2a;
    --text: #e8e4de;
    --text-dim: #888;
    --text-faint: #555;
    --accent: #e05252;
    --accent-dim: #3d2020;
    --accent-bg: #1a0e0e;
    --accent-secondary: #52b4e0;
    --accent-secondary-dim: #1a2a3a;
    --pass: #22c55e;
    --warn: #f59e0b;
    --fail: #ef4444;
    --mono: 'IBM Plex Mono', 'Courier New', Courier, monospace;
    --serif: Georgia, 'Times New Roman', serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ===== PASSWORD GATE ===== */
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  #gate h1 {
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 6px;
    text-align: center;
  }
  #gate .gate-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 30px;
  }
  #gate .gate-input-wrap {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 380px;
  }
  #gate input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 4px;
    outline: none;
  }
  #gate input:focus { border-color: var(--accent); }
  #gate input::placeholder { color: var(--text-faint); }
  #gate button {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 12px 20px;
    border-radius: 4px;
    cursor: pointer;
  }
  #gate button:hover { opacity: 0.9; }
  #gate .gate-error {
    color: var(--fail);
    font-size: 12px;
    margin-top: 12px;
    height: 18px;
  }

  /* ===== MAIN APP ===== */
  #app {
    display: none;
    max-width: 740px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Header */
  .header { margin-bottom: 20px; }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .title-row h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .round-badge {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .round-badge .total {
    font-size: 16px;
    color: var(--text-faint);
  }
  .difficulty-bar {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pip {
    width: 40px;
    height: 5px;
    border-radius: 2px;
    background: #333;
    transition: background 0.3s;
  }
  .pip.done { background: var(--pass); }
  .pip.active { background: var(--accent); }
  .difficulty-label {
    margin-left: 10px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    font-weight: 700;
  }

  /* Specimen Card */
  .specimen-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .specimen-header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .specimen-tag {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    font-weight: 700;
  }
  .specimen-context {
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 1px;
  }
  .specimen-body {
    padding: 20px;
  }
  .specimen-text {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.75;
    color: #d4d0c8;
  }

  /* Challenge Box */
  .challenge-box {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #c8b8b8;
    line-height: 1.5;
  }
  .challenge-box strong { color: var(--text); }

  /* Phases */
  .phase { display: none; }
  .phase.active { display: block; }

  /* Start Button */
  .start-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .start-btn:hover { background: rgba(224,82,82,0.08); }

  /* Step Labels */
  .step-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }
  .step-label-secondary {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent-secondary);
    font-weight: 700;
    margin-bottom: 10px;
  }

  /* Flaw Selection */
  .flaw-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .flaw-option {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .flaw-option:hover { border-color: var(--text-dim); }
  .flaw-option.selected { border-color: var(--accent); background: var(--accent-bg); }
  .flaw-option-name {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .flaw-option-desc {
    font-family: var(--serif);
    font-size: 11px;
    line-height: 1.4;
    color: var(--text-dim);
  }

  /* Textarea */
  textarea {
    width: 100%;
    min-height: 120px;
    background: #111;
    border: 1px solid #333;
    border-radius: 4px;
    color: var(--text);
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.6;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-faint); }
  textarea:disabled { opacity: 0.5; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .submit-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 3px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .secondary-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 3px;
  }
  .secondary-btn:hover { background: rgba(224,82,82,0.08); }
  .ghost-btn {
    background: transparent;
    border: 1px solid #555;
    color: #999;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 3px;
  }
  .ghost-btn:hover { border-color: #888; color: #ccc; }

  .word-count {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
  }

  /* Error */
  .error-box {
    margin-top: 8px;
    padding: 8px 12px;
    background: #1a0e0e;
    border: 1px solid #3d2020;
    border-radius: 4px;
    font-size: 12px;
    color: var(--fail);
    display: none;
  }
  .error-box.show { display: block; }

  /* Feedback */
  .verdict-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    border: 2px solid;
    border-radius: 4px;
    margin-bottom: 14px;
    background: #111;
  }
  .verdict-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
  }
  .feedback-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .feedback-section-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .feedback-text {
    font-family: var(--serif);
    font-size: 14px;
    line-height: 1.6;
    color: #d4d0c8;
  }
  .nudge-text {
    font-family: var(--serif);
    font-size: 13px;
    line-height: 1.5;
    color: var(--accent);
    font-style: italic;
    margin-top: 10px;
  }

  /* Complete Screen */
  .complete-card {
    text-align: center;
    padding: 40px 30px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-top: 40px;
  }
  .complete-card h1 {
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .complete-score {
    font-size: 16px;
    color: var(--text-dim);
  }
  .results-list { margin-top: 20px; text-align: left; }
  .result-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #222;
    font-size: 12px;
  }
  .result-diff { color: var(--text-dim); letter-spacing: 1px; }
  .result-verdict { font-weight: 700; letter-spacing: 1px; }
  .reset-btn {
    margin-top: 24px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 12px 28px;
    cursor: pointer;
    border-radius: 4px;
  }
  .reset-btn:hover { background: rgba(224,82,82,0.08); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #fff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* Mobile */
  @media (max-width: 500px) {
    .title-row h1 { font-size: 14px; letter-spacing: 2px; }
    .pip { width: 28px; }
    .flaw-options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ===== PASSWORD GATE ===== -->
<div id="gate">
  <h1>THE DIAGNOSIS LAB</h1>
  <div class="gate-sub">AP Language &amp; Composition</div>
  <div class="gate-input-wrap">
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off" />
    <button onclick="checkPassword()">ENTER</button>
  </div>
  <div class="gate-error" id="pw-error"></div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <div class="header">
    <div class="title-row">
      <h1>THE DIAGNOSIS LAB</h1>
      <div class="round-badge"><span id="round-num">1</span><span class="total">/5</span></div>
    </div>
    <div class="difficulty-bar" id="difficulty-bar">
      <div class="pip" id="pip-0"></div>
      <div class="pip" id="pip-1"></div>
      <div class="pip" id="pip-2"></div>
      <div class="pip" id="pip-3"></div>
      <div class="pip" id="pip-4"></div>
      <span class="difficulty-label" id="difficulty-label"></span>
    </div>
  </div>

  <!-- Specimen -->
  <div class="specimen-card">
    <div class="specimen-header">
      <span class="specimen-tag">SPECIMEN</span>

    <div class="specimen-body">
      <div class="specimen-text" id="specimen-text"></div>
    </div>
  </div>

  <!-- Challenge -->
  <div class="challenge-box" id="challenge-box">
    <span>🔬</span>
    <span id="challenge-text"></span>
  </div>

  <!-- Phase: Start -->
  <div class="phase active" id="phase-start">
    <button class="start-btn" id="start-btn" onclick="startRound()">EXAMINE SPECIMEN 1</button>
  </div>

  <!-- Phase: Diagnose -->
  <div class="phase" id="phase-diagnose">
    <div class="step-label">STEP 1 — DIAGNOSE THE FLAW</div>
    <div class="flaw-options" id="flaw-options"></div>
    <div class="btn-row">
      <button class="submit-btn" id="diagnose-btn" onclick="submitDiagnosis()" disabled>LOCK IN DIAGNOSIS</button>
    </div>
    <div class="error-box" id="error-diagnose"></div>
  </div>

  <!-- Phase: Rewrite -->
  <div class="phase" id="phase-rewrite">
    <div class="step-label-secondary">STEP 2 — REWRITE THE BROKEN COMPONENT</div>
    <div id="rewrite-instruction" style="font-family:var(--serif);font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;"></div>
    <textarea id="rewrite-input" placeholder="Your rewritten version goes here..."></textarea>
    <div class="word-count" id="rewrite-word-count">0 words</div>
    <div class="btn-row">
      <button class="submit-btn" id="rewrite-btn" onclick="submitRewrite()">SUBMIT REWRITE</button>
    </div>
    <div class="error-box" id="error-rewrite"></div>
  </div>

  <!-- Phase: Feedback -->
  <div class="phase" id="phase-feedback">
    <div class="verdict-banner" id="verdict-banner">
      <span class="verdict-text" id="verdict-text"></span>
      <span id="verdict-check"></span>
    </div>

    <div class="feedback-section">
      <div class="feedback-section-label">YOUR DIAGNOSIS</div>
      <div class="feedback-text" id="fb-diagnosis"></div>
    </div>

    <div class="feedback-section">
      <div class="feedback-section-label">COACH'S ANALYSIS</div>
      <div class="feedback-text" id="fb-analysis"></div>
      <div class="nudge-text" id="fb-nudge"></div>
    </div>

    <div class="feedback-section" style="background:#111;border-color:#222;">
      <div class="feedback-section-label">YOUR REWRITE</div>
      <div class="feedback-text" id="fb-rewrite" style="color:var(--text-dim);font-style:italic;"></div>
    </div>

    <div class="btn-row" id="feedback-actions"></div>
  </div>

  <!-- Complete -->
  <div id="complete-screen" style="display:none;">
    <div class="complete-card">
      <div id="complete-emoji" style="font-size:40px;margin-bottom:12px;"></div>
      <h1>LAB COMPLETE</h1>
      <div class="complete-score" id="complete-score"></div>
      <div class="results-list" id="results-list"></div>
      <button class="reset-btn" onclick="resetAll()">RUN IT AGAIN</button>
    </div>
  </div>
</div>

<script>

const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";
const PASSWORD = "APLangRulez";

// ===== END CONFIG =====

const FLAW_TYPES = [
  { id: "weak-claim", name: "Weak Claim", desc: "The claim is vague, obvious, or not actually arguable" },
  { id: "evidence-dump", name: "Evidence Dump", desc: "Evidence is listed but never explained or connected" },
  { id: "parrot-reasoning", name: "Parrot Reasoning", desc: "The reasoning just restates the evidence in different words" },
  { id: "drifter-reasoning", name: "Drifter Reasoning", desc: "The reasoning wanders off-topic from the claim" },
  { id: "no-rebuttal", name: "Unfinished Counter", desc: "A counterargument is raised but never answered" },
  { id: "missing-reasoning", name: "Missing Reasoning", desc: "There's a claim and evidence but no reasoning at all" }
];

const ROUNDS = [
  {
    difficulty: "WARM-UP",
    context: "Missing a critical piece",
    flaw: "missing-reasoning",
    flawLabel: "Missing Reasoning",
    brokenComponent: "reasoning",
    paragraph: "Paine's vision of an America where diverse peoples unite under shared principles remains relevant today. According to the U.S. Census Bureau, the country's population is more ethnically and racially diverse than at any point in its history, with no single racial group projected to hold a majority by 2045. Immigration from Latin America, Asia, and Africa has accelerated this shift over the past three decades.",
    challenge: "This paragraph has a <strong>claim</strong> and <strong>evidence</strong>, but something critical is missing. Find the gap, then fill it.",
    rewritePrompt: "Write the reasoning that should follow this evidence. Connect the diversity data back to Paine's vision — what does this evidence actually prove about his characterization?"
  },
  {
    difficulty: "STANDARD",
    context: "Something sounds familiar",
    flaw: "parrot-reasoning",
    flawLabel: "Parrot Reasoning",
    brokenComponent: "reasoning",
    paragraph: "Paine's claim that America's government keeps taxes low and avoids oppressing the poor does not hold up under modern scrutiny. The United States has one of the highest rates of income inequality among developed nations, with the wealthiest 1% controlling more wealth than the bottom 50% combined, while healthcare costs push hundreds of thousands into bankruptcy each year. In other words, wealth in America is concentrated at the top while many people at the bottom face financial ruin from medical expenses, showing that inequality is a serious issue in the country.",
    challenge: "The claim is solid. The evidence is strong. But read the last sentence carefully — is the <strong>reasoning</strong> actually doing its job?",
    rewritePrompt: "Rewrite the reasoning (the final sentence). Don't just restate what the evidence already told us — explain WHY this pattern of inequality specifically undermines Paine's characterization."
  },
  {

    context: "Check the argument's foundation",
    flaw: "weak-claim",
    flawLabel: "Weak Claim",
    brokenComponent: "claim",
    paragraph: "America has changed a lot since Thomas Paine wrote about it. The Civil Rights Movement of the 1950s and 1960s dismantled legal segregation through landmark legislation like the Civil Rights Act of 1964 and the Voting Rights Act of 1965, extending constitutional protections that had been denied to Black Americans for nearly a century. These hard-won legal victories demonstrate that the American system, while deeply flawed in practice, contains within its founding framework the mechanisms for self-correction — a quality Paine might have recognized as proof of governance built on 'the rights of man.'",
    challenge: "The evidence is excellent and the reasoning is sharp. So where's the problem? Look at <strong>where the paragraph starts</strong>.",
    rewritePrompt: "Rewrite the opening claim (first sentence only). It needs to be a defensible, arguable assertion that the evidence and reasoning actually support — not a vague observation."
  },
  {
    difficulty: "ADVANCED",
    context: "The argument gives ground it never takes back",
    flaw: "no-rebuttal",
    flawLabel: "Unfinished Counter",
    brokenComponent: "rebuttal",
    paragraph: "Paine's characterization of America as a place where different peoples achieve 'cordial unison' holds more truth than cynics might expect. Grassroots coalition-building across racial and ethnic lines has driven major policy achievements, from the multiracial labor organizing of the 1930s to the diverse coalitions behind the marriage equality movement in the 2010s. These alliances suggest that shared purpose can bridge demographic differences, validating Paine's core insight. Admittedly, these coalitions have often formed in response to shared oppression rather than shared optimism, and many fractured once the immediate crisis passed — the Civil Rights coalition splintered over Vietnam, and the Obama-era coalition couldn't sustain itself through the political backlash that followed.",
    challenge: "This paragraph makes a strong case, then introduces a <strong>counterargument</strong>. But read to the end — does it finish the job?",
    rewritePrompt: "Write the rebuttal — the 1-2 sentences that should follow the counterargument. Acknowledge what the opposition gets right, then explain why the original claim still holds."
  },
  {
    difficulty: "BOSS ROUND",
    context: "Multiple issues — find the primary one",
    flaw: "evidence-dump",
    flawLabel: "Evidence Dump",
    brokenComponent: "reasoning",
    paragraph: "Paine's belief that American governance avoids the oppression found in European systems is complicated by history. The Indian Removal Act of 1830 forcibly relocated tens of thousands of Native Americans, killing thousands on the Trail of Tears. Japanese Americans were interned in camps during World War II solely based on their ethnicity. The Patriot Act of 2001 expanded government surveillance powers in ways that disproportionately affected Muslim Americans. The family separation policy at the southern border in 2018 resulted in thousands of children being taken from their parents. The Chinese Exclusion Act of 1882 was the first federal law to ban immigration based on race.",
    challenge: "There's a lot of evidence in here. <em>Too much</em>, actually. Find the <strong>primary flaw</strong>, then fix the paragraph by choosing the strongest 1-2 examples and writing the reasoning that connects them to the claim.",
    rewritePrompt: "Pick the 1-2 strongest pieces of evidence from the list and write them with proper reasoning that connects to the claim. Quality over quantity — show how your chosen examples specifically challenge Paine's assertion, don't just list more history."
  }
];

const SYSTEM_PROMPT = `You are an AP Language and Composition writing coach evaluating a student's ability to DIAGNOSE and FIX flawed argument paragraphs.

You will receive:
- The ORIGINAL flawed paragraph the student examined
- The ACTUAL FLAW (what was intentionally wrong)
- The student's DIAGNOSIS (which flaw type they selected)
- The student's REWRITE (their attempt to fix the broken component)

EVALUATE TWO THINGS:

1. DIAGNOSIS ACCURACY: Did the student correctly identify the flaw?
2. REWRITE QUALITY: Does their rewrite actually fix the problem? Does it demonstrate the skill that was missing?

RESPOND ONLY with a JSON object in this exact format, with no other text:
{"verdict": "PASS or PUSH HARDER or TRY AGAIN", "diagnosis_correct": true or false, "analysis": "2-3 sentences evaluating both their diagnosis and their rewrite. Be specific about what works and what doesn't. If their diagnosis was wrong, explain what the actual flaw was and why. If their rewrite falls into the same trap as the original, call it out. Be conversational and direct.", "nudge": "1 sentence — concrete next step if they need to improve, or what made their fix work if they passed."}

CALIBRATION:
- PASS = Correct diagnosis AND the rewrite genuinely fixes the flaw with real analytical quality
- PUSH HARDER = Correct diagnosis but the rewrite is weak, OR wrong diagnosis but a decent rewrite that shows understanding
- TRY AGAIN = Wrong diagnosis AND weak rewrite, or the rewrite repeats the same flaw

Be tough but fair. Keep all feedback to 3 sentences max. Talk like a coach, not a rubric.`;

// ===== STATE =====
let currentRound = 0;
let selectedFlaw = null;
let roundResults = [];

// ===== PASSWORD =====
function checkPassword() {
  const input = document.getElementById("pw-input").value;
  if (input === PASSWORD) {
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display = "block";
    renderRound();
  } else {
    document.getElementById("pw-error").textContent = "Wrong password. Try again.";
  }
}
document.getElementById("pw-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkPassword();
});

// ===== RENDER =====
function renderRound() {
  const round = ROUNDS[currentRound];
  document.getElementById("round-num").textContent = currentRound + 1;
  document.getElementById("difficulty-label").textContent = round.difficulty;
  document.getElementById("specimen-context").textContent = round.context;
  document.getElementById("specimen-text").textContent = round.paragraph;
  document.getElementById("challenge-text").innerHTML = round.challenge;
  document.getElementById("start-btn").textContent = "EXAMINE SPECIMEN " + (currentRound + 1);

  // Pips
  for (let i = 0; i < 5; i++) {
    const pip = document.getElementById("pip-" + i);
    pip.className = "pip";
    if (i < currentRound) pip.classList.add("done");
    else if (i === currentRound) pip.classList.add("active");
    pip.style.opacity = i <= currentRound ? "1" : "0.4";
  }

  // Reset phases
  showPhase("phase-start");
  document.getElementById("complete-screen").style.display = "none";
  document.getElementById("rewrite-input").value = "";
  document.getElementById("rewrite-input").disabled = false;
  document.getElementById("rewrite-btn").disabled = false;
  document.getElementById("rewrite-btn").textContent = "SUBMIT REWRITE";
  document.getElementById("rewrite-word-count").textContent = "0 words";
  document.getElementById("diagnose-btn").disabled = true;
  document.getElementById("error-diagnose").classList.remove("show");
  document.getElementById("error-rewrite").classList.remove("show");
  selectedFlaw = null;

  // Show main UI
  document.querySelector(".header").style.display = "";
  document.querySelector(".specimen-card").style.display = "";
  document.getElementById("challenge-box").style.display = "";
}

function showPhase(id) {
  document.querySelectorAll(".phase").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startRound() {
  // Build flaw options
  const container = document.getElementById("flaw-options");
  container.innerHTML = "";

  // Shuffle flaw types for variety
  const shuffled = [...FLAW_TYPES].sort(() => Math.random() - 0.5);
  shuffled.forEach(flaw => {
    const el = document.createElement("div");
    el.className = "flaw-option";
    el.dataset.id = flaw.id;
    el.innerHTML = `<div class="flaw-option-name">${flaw.name}</div><div class="flaw-option-desc">${flaw.desc}</div>`;
    el.onclick = function() {
      document.querySelectorAll(".flaw-option").forEach(o => o.classList.remove("selected"));
      el.classList.add("selected");
      selectedFlaw = flaw.id;
      document.getElementById("diagnose-btn").disabled = false;
    };
    container.appendChild(el);
  });

  showPhase("phase-diagnose");
}

function submitDiagnosis() {
  if (!selectedFlaw) return;

  const round = ROUNDS[currentRound];
  document.getElementById("rewrite-instruction").textContent = round.rewritePrompt;
  showPhase("phase-rewrite");
  document.getElementById("rewrite-input").focus();
}

// Word count
document.getElementById("rewrite-input").addEventListener("input", function() {
  const words = this.value.trim() ? this.value.trim().split(/\s+/).length : 0;
  document.getElementById("rewrite-word-count").textContent = words + " words";
});

// ===== SUBMIT REWRITE =====
async function submitRewrite() {
  const rewrite = document.getElementById("rewrite-input").value.trim();
  const errorBox = document.getElementById("error-rewrite");

  if (GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE" || !GEMINI_API_KEY) {
    errorBox.textContent = "API key not configured. Open this HTML file and paste your Gemini API key in the CONFIG section.";
    errorBox.classList.add("show");
    return;
  }
  if (!rewrite || rewrite.split(/\s+/).length < 10) {
    errorBox.textContent = "Give me at least a couple sentences to evaluate.";
    errorBox.classList.add("show");
    return;
  }

  errorBox.classList.remove("show");
  const btn = document.getElementById("rewrite-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>ANALYZING...';
  document.getElementById("rewrite-input").disabled = true;

  const round = ROUNDS[currentRound];
  const selectedFlawName = FLAW_TYPES.find(f => f.id === selectedFlaw)?.name || selectedFlaw;
  const actualFlawName = round.flawLabel;

  const userMessage = `ROUND: ${round.difficulty}

ORIGINAL FLAWED PARAGRAPH:
${round.paragraph}

ACTUAL FLAW: ${actualFlawName} (the ${round.brokenComponent} was intentionally broken)

STUDENT'S DIAGNOSIS: ${selectedFlawName} (${selectedFlaw === round.flaw ? "CORRECT" : "INCORRECT — they picked the wrong flaw"})

STUDENT'S REWRITE OF THE ${round.brokenComponent.toUpperCase()}:
${rewrite}`;

  try {
    const cleanKey = GEMINI_API_KEY.trim();
    const apiUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";

    const apiResponse = await fetch(apiUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-goog-api-key": cleanKey
      },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: [{ parts: [{ text: userMessage }] }],
        generationConfig: {
          responseMimeType: "application/json",
          temperature: 0.7
        }
      })
    });

    const data = await apiResponse.json();

    if (data.error) {
      const keyPreview = cleanKey.slice(0, 8) + "..." + cleanKey.slice(-4);
      throw new Error(`${data.error.message} [Key: ${keyPreview}, status: ${data.error.code}]`);
    }

    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    const cleanText = rawText.replace(/```json|```/g, "").trim();

    let parsed;
    try {
      parsed = JSON.parse(cleanText);
    } catch {
      parsed = { verdict: "PUSH HARDER", diagnosis_correct: selectedFlaw === round.flaw, analysis: cleanText.slice(0, 300), nudge: "Try resubmitting." };
    }

    showFeedback(parsed, rewrite);

  } catch (err) {
    errorBox.textContent = "Connection issue — " + (err.message || "try again.");
    errorBox.classList.add("show");
    btn.disabled = false;
    btn.textContent = "SUBMIT REWRITE";
    document.getElementById("rewrite-input").disabled = false;
  }
}

// ===== FEEDBACK =====
function showFeedback(feedback, rewrite) {
  const round = ROUNDS[currentRound];
  const selectedFlawName = FLAW_TYPES.find(f => f.id === selectedFlaw)?.name || selectedFlaw;

  // Verdict
  const color = feedback.verdict === "PASS" ? "var(--pass)" :
                feedback.verdict === "PUSH HARDER" ? "var(--warn)" : "var(--fail)";
  document.getElementById("verdict-banner").style.borderColor = color;
  const vt = document.getElementById("verdict-text");
  vt.textContent = feedback.verdict;
  vt.style.color = color;
  document.getElementById("verdict-check").textContent = feedback.verdict === "PASS" ? "✓" : "";

  // Diagnosis display
  const diagCorrect = feedback.diagnosis_correct || (selectedFlaw === round.flaw);
  document.getElementById("fb-diagnosis").innerHTML =
    `You identified: <strong>${selectedFlawName}</strong> ` +
    (diagCorrect
      ? `<span style="color:var(--pass)">✓ CORRECT</span>`
      : `<span style="color:var(--fail)">✗ INCORRECT</span> — Actual flaw: <strong>${round.flawLabel}</strong>`);

  // Analysis
  document.getElementById("fb-analysis").textContent = feedback.analysis || "";
  const nudge = document.getElementById("fb-nudge");
  nudge.textContent = feedback.nudge || "";
  nudge.style.display = feedback.nudge ? "block" : "none";

  // Their rewrite
  document.getElementById("fb-rewrite").textContent = rewrite;

  // Track result
  if (feedback.verdict === "PASS") {
    roundResults.push({ round: currentRound, verdict: "PASS", diagCorrect: true });
  }

  // Actions
  const actions = document.getElementById("feedback-actions");
  actions.innerHTML = "";

  if (feedback.verdict !== "PASS") {
    const retryBtn = document.createElement("button");
    retryBtn.className = "secondary-btn";
    retryBtn.textContent = "REVISE & RESUBMIT";
    retryBtn.onclick = function() {
      showPhase("phase-rewrite");
      document.getElementById("rewrite-input").disabled = false;
      document.getElementById("rewrite-btn").disabled = false;
      document.getElementById("rewrite-btn").textContent = "SUBMIT REWRITE";
      document.getElementById("rewrite-input").focus();
    };
    actions.appendChild(retryBtn);
  }

  const nextBtn = document.createElement("button");
  nextBtn.className = "ghost-btn";
  if (feedback.verdict === "PASS") {
    nextBtn.textContent = currentRound >= ROUNDS.length - 1 ? "FINISH" : "NEXT SPECIMEN →";
  } else {
    nextBtn.textContent = currentRound >= ROUNDS.length - 1 ? "FINISH ANYWAY" : "SKIP TO NEXT →";
  }
  nextBtn.onclick = function() {
    if (currentRound >= ROUNDS.length - 1) {
      showComplete();
    } else {
      currentRound++;
      renderRound();
    }
  };
  actions.appendChild(nextBtn);

  showPhase("phase-feedback");
}

// ===== COMPLETE =====
function showComplete() {
  document.querySelector(".header").style.display = "none";
  document.querySelector(".specimen-card").style.display = "none";
  document.getElementById("challenge-box").style.display = "none";
  showPhase("phase-start"); // hide all active phases
  document.querySelectorAll(".phase").forEach(p => p.classList.remove("active"));

  const screen = document.getElementById("complete-screen");
  screen.style.display = "block";

  const passedCount = roundResults.filter(r => r.verdict === "PASS").length;
  document.getElementById("complete-emoji").textContent =
    passedCount >= 4 ? "🔬" : passedCount >= 2 ? "🧪" : "📋";
  document.getElementById("complete-score").textContent =
    passedCount + " / " + ROUNDS.length + " specimens diagnosed";

  const list = document.getElementById("results-list");
  list.innerHTML = "";
  ROUNDS.forEach(function(r, i) {
    const result = roundResults.find(rr => rr.round === i);
    const row = document.createElement("div");
    row.className = "result-row";
    row.innerHTML =
      '<span class="result-diff">' + r.difficulty + ' — ' + r.flawLabel + '</span>' +
      '<span class="result-verdict" style="color:' + (result ? "var(--pass)" : "var(--text-faint)") + '">' +
      (result ? "PASS" : "—") + '</span>';
    list.appendChild(row);
  });
}

function resetAll() {
  currentRound = 0;
  selectedFlaw = null;
  roundResults = [];
  renderRound();
}
</script>
