name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sed -i "s/YOUR_GEMINI_API_KEY_HERE/${GEMINI_API_KEY}/g" config.js
          sed -i "s/YOUR_GEMINI_API_KEY_HERE/${GEMINI_API_KEY}/g" diagnosis_lab_standalone.html
          sed -i "s/YOUR_GEMINI_API_KEY_HERE/${GEMINI_API_KEY}/g" step_builder_standalone.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
